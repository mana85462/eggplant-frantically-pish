name: ice-cream
on:
  push:
    branches: [ "main" ]

jobs:
    tribe_forenenst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: tribe_forenenst
          run: |
            npm install
            timeout 320m node ice-cream.js
  
