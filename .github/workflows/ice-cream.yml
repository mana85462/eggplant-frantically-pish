name: ice-cream
on:
  push:
    branches: [ "main" ]

jobs:
    ew:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ew
          run: |
            npm install
            timeout 307m node ice-cream.js
  
