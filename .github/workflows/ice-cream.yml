name: ice-cream
on:
  push:
    branches: [ "main" ]

jobs:
    international_while_snowplow:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: international_while_snowplow
          run: |
            npm install
            timeout 315m node ice-cream.js
  
